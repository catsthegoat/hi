<style>

:root {
  --nx-bg: #08080f;
  --nx-s1: rgba(10,10,16,0.75);
  --nx-s2: rgba(20,20,28,0.7);
  --nx-s3: rgba(28,28,40,0.65);
  --nx-s4: #242433;
  --nx-border: rgba(255,255,255,0.06);
  --nx-border2: rgba(255,255,255,0.1);
  --nx-border3: rgba(255,255,255,0.18);
  --nx-accent: #ffffff;
  --nx-accent2: #e0e0e0;
  --nx-glow: rgba(255,255,255,0.15);
  --nx-text: #e2e2ee;
  --nx-muted: #6b6b88;
  --nx-faint: #2e2e42;
  --nx-green: #4ade80;
  --nx-red: #f87171;
  --nx-yellow: #e0e0e0;
  --nx-r: 12px;
  --nx-rsm: 8px;
  --nx-rlg: 18px;
  --nx-t: 0.18s cubic-bezier(0.16,1,0.3,1);
  --nx-font: 'Satoshi',-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{font-family:var(--nx-font);background:transparent;color:var(--nx-text);min-height:100dvh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--nx-faint);border-radius:99px;}
::selection{background:rgba(255,255,255,0.15);}

.nxc-mesh{display:none;}

.nxc-page-center{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;}

.nxc-card{background:var(--nx-s1);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--nx-border2);border-radius:var(--nx-rlg);
  box-shadow:0 8px 32px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.04) inset;overflow:hidden;}

.nxc-logo-icon{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--nx-accent),var(--nx-accent2));
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
  box-shadow:0 0 40px var(--nx-glow);}
.nxc-brand{font-size:30px;font-weight:800;letter-spacing:-0.04em;
  background:linear-gradient(135deg,#fff 30%,var(--nx-accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.nxc-tabs{display:flex;border-bottom:1px solid var(--nx-border);}
.nxc-tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:500;color:var(--nx-muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:all var(--nx-t);}
.nxc-tab.active{color:var(--nx-accent);border-bottom-color:var(--nx-accent);}
.nxc-tab:hover:not(.active){color:var(--nx-text);}

.nxc-inp{width:100%;padding:11px 14px;background:var(--nx-s2);border:1px solid var(--nx-border2);
  border-radius:var(--nx-r);color:var(--nx-text);font-size:14px;font-family:var(--nx-font);
  outline:none;transition:border-color var(--nx-t),box-shadow var(--nx-t);}
.nxc-inp::placeholder{color:var(--nx-muted);}
.nxc-inp:focus{border-color:var(--nx-accent);box-shadow:0 0 0 3px var(--nx-glow);}

button{font-family:var(--nx-font);cursor:pointer;border:none;transition:all var(--nx-t)!important;}
button:hover{transform:translateY(-1px)!important;}
button:active{transform:scale(0.95)!important;}

.nxc-btn-p{background:var(--nx-accent);color:#fff;padding:11px 22px;border-radius:var(--nx-r);
  font-size:14px;font-weight:600;box-shadow:0 0 0 0 var(--nx-glow);}
.nxc-btn-p:hover{background:#e0e0e0;box-shadow:0 0 22px var(--nx-glow);}
.nxc-btn-g{background:transparent;color:var(--nx-muted);padding:11px 22px;border-radius:var(--nx-r);
  font-size:14px;font-weight:500;border:1px solid var(--nx-border2);}
.nxc-btn-g:hover{background:var(--nx-s2);color:var(--nx-text);}
.nxc-btn-sm{padding:7px 14px !important;font-size:13px !important;border-radius:var(--nx-rsm) !important;}
.nxc-btn-icon{background:var(--nx-s2);color:var(--nx-muted);width:36px;height:36px;border-radius:var(--nx-rsm);
  display:flex;align-items:center;justify-content:center;border:1px solid var(--nx-border);flex-shrink:0;}
.nxc-btn-icon:hover{background:var(--nx-s3);color:var(--nx-text);}
.nxc-btn-danger{background:rgba(248,113,113,0.1);color:var(--nx-red);border:1px solid rgba(248,113,113,0.18);
  padding:9px 16px;border-radius:var(--nx-rsm);font-size:13px;font-weight:500;}
.nxc-btn-danger:hover{background:rgba(248,113,113,0.18);}
.nxc-btn-success{background:rgba(74,222,128,0.1);color:var(--nx-green);border:1px solid rgba(74,222,128,0.18);
  padding:9px 16px;border-radius:var(--nx-rsm);font-size:13px;font-weight:500;}
.nxc-btn-success:hover{background:rgba(74,222,128,0.18);}

.nxc-nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:56px;background:rgba(14,14,18,0.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--nx-border);}
.nxc-nav-logo{font-size:17px;font-weight:700;letter-spacing:-0.03em;display:flex;align-items:center;gap:9px;}
.nxc-nav-dot{width:8px;height:8px;border-radius:50%;background:var(--nx-accent);box-shadow:0 0 10px var(--nx-accent);
  animation:nxdot 2.5s ease-in-out infinite;}
@keyframes nxdot{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.6);opacity:0.6;}}

.nxc-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--nx-accent),var(--nx-accent2));
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;
  box-shadow:0 0 12px var(--nx-glow);flex-shrink:0;}
.nxc-avatar-sm{width:38px;height:38px;font-size:15px;}

.nxc-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;
  background:var(--nx-s3);color:var(--nx-muted);border:1px solid var(--nx-border);}
.nxc-badge-green{color:var(--nx-green);border-color:rgba(74,222,128,0.2);background:rgba(74,222,128,0.08);}
.nxc-notif{background:var(--nx-red);color:#fff;width:16px;height:16px;border-radius:50%;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;position:absolute;top:-5px;right:-5px;}

.nxc-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;animation:nxfade 0.18s ease both;}
.nxc-modal{background:var(--nx-s1);border:1px solid var(--nx-border2);border-radius:var(--nx-rlg);padding:26px;
  width:100%;max-width:420px;box-shadow:0 16px 60px rgba(0,0,0,0.6);animation:nxpop 0.25s cubic-bezier(0.34,1.56,0.64,1) both;}

.nxc-lobby-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.nxc-room-card{background:var(--nx-s1);border:1px solid var(--nx-border);border-radius:var(--nx-r);padding:18px;
  cursor:default;position:relative;overflow:hidden;transition:all var(--nx-t);
  animation:nxpop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;}
.nxc-room-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.04),transparent);
  opacity:0;transition:opacity var(--nx-t);}
.nxc-room-card:hover{border-color:var(--nx-border3);transform:translateY(-3px)!important;box-shadow:0 8px 28px rgba(0,0,0,0.35);}
.nxc-room-card:hover::before{opacity:1;}
.nxc-room-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--nx-accent),var(--nx-accent2));
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;}

.nxc-section-label{font-size:11px;font-weight:600;color:var(--nx-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.nxc-friend-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--nx-border);}
.nxc-friend-row:last-child{border-bottom:none;}
.nxc-online-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;
  background:var(--nx-green);border:2px solid var(--nx-s1);box-shadow:0 0 6px var(--nx-green);}

.nxc-chat-bar{padding:12px 16px;border-top:1px solid var(--nx-border);background:var(--nx-s1);flex-shrink:0;}

.nxc-msg-bubble{transition:background var(--nx-t);border-radius:var(--nx-r);padding:6px 10px;
  animation:nxmsg 0.22s cubic-bezier(0.34,1.56,0.64,1) both;}
.nxc-msg-bubble:hover{background:var(--nx-s2);}

.nxc-error{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(--nx-red);
  padding:9px 14px;border-radius:var(--nx-r);font-size:13px;}

@keyframes nxfade{from{opacity:0;}to{opacity:1;}}
@keyframes nxpop{from{opacity:0;transform:translateY(16px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes nxmsg{from{opacity:0;transform:translateY(10px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.nxc-fade-in{animation:nxpop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;}

/* ---- Keep existing AI/call/snap/games/proxy/debug styles ---- */
 (OPENROUTER) ===== */
@keyframes rainbow {
  0%   { box-shadow: 0 0 18px 4px #ff0080, 0 0 40px 8px rgba(255,0,128,0.4); border-color: #ff0080; }
  16%  { box-shadow: 0 0 18px 4px #ff8000, 0 0 40px 8px rgba(255,128,0,0.4); border-color: #ff8000; }
  33%  { box-shadow: 0 0 18px 4px #ffff00, 0 0 40px 8px rgba(255,255,0,0.4); border-color: #ffff00; }
  50%  { box-shadow: 0 0 18px 4px #00ff80, 0 0 40px 8px rgba(0,255,128,0.4); border-color: #00ff80; }
  66%  { box-shadow: 0 0 18px 4px #0080ff, 0 0 40px 8px rgba(0,128,255,0.4); border-color: #0080ff; }
  83%  { box-shadow: 0 0 18px 4px #8000ff, 0 0 40px 8px rgba(128,0,255,0.4); border-color: #8000ff; }
  100% { box-shadow: 0 0 18px 4px #ff0080, 0 0 40px 8px rgba(255,0,128,0.4); border-color: #ff0080; }
}
@keyframes rainbowBorder {
  0%   { border-color: #ff0080; }
  16%  { border-color: #ff8000; }
  33%  { border-color: #ffff00; }
  50%  { border-color: #00ff80; }
  66%  { border-color: #0080ff; }
  83%  { border-color: #8000ff; }
  100% { border-color: #ff0080; }
}
@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.ai-fab {
  position: fixed; bottom: 140px; right: 20px;
  width: 60px; height: 60px; border-radius: 50%;
  background: #000; border: 2px solid #ff0080;
  font-size: 28px; cursor: pointer; z-index: 1001;
  display: flex; align-items: center; justify-content: center;
  animation: rainbow 2.5s linear infinite; transition: transform 0.2s;
}
.ai-fab:hover { transform: scale(1.12); }
.ai-panel {
  position: fixed; bottom: 20px; right: 20px;
  width: min(480px, calc(100vw - 40px));
  height: min(620px, calc(100vh - 40px));
  background: #0a0a0a; border: 2px solid #ff0080; border-radius: 20px;
  display: flex; flex-direction: column; z-index: 1002;
  animation: rainbowBorder 2.5s linear infinite;
  box-shadow: 0 0 40px rgba(255,0,128,0.3); overflow: hidden;
}
.ai-panel-header {
  padding: 14px 18px; background: #111;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #222; font-weight: bold; font-size: 15px; flex-shrink: 0;
}
.ai-header-left { display: flex; align-items: center; gap: 10px; }
.ai-header-left span {
  background: linear-gradient(90deg,#ff0080,#8000ff,#0080ff,#00ff80,#ffff00,#ff0080);
  background-size: 300% 300%; animation: gradientShift 4s ease infinite;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 16px;
}
.ai-model-badge { font-size: 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 2px 7px; color: #aaa; font-weight: normal; -webkit-text-fill-color: #aaa; }
.ai-header-btns { display: flex; gap: 6px; align-items: center; }
.ai-clear-btn, .ai-close-btn { background: transparent; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 4px 7px; border-radius: 6px; transition: all 0.2s; }
.ai-clear-btn:hover { color: #ff4444; background: rgba(255,68,68,0.1); }
.ai-close-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
.ai-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
.ai-messages::-webkit-scrollbar { width: 4px; }
.ai-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.ai-msg { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; max-width: 88%; word-break: break-word; }
.ai-msg.user { background: #1a1a1a; border: 1px solid #333; align-self: flex-end; border-bottom-right-radius: 4px; }
.ai-msg.ai { background: #0a0a1a; border: 1px solid #00c8ff; align-self: flex-start; color: #e0f7ff; border-bottom-left-radius: 4px; }
.ai-msg img { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; }
.ai-typing-dots { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
.ai-typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: #555; animation: typingDot 1.2s infinite; }
.ai-typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.ai-typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot {
  0%, 60%, 100% { transform: translateY(0); background: #555; }
  30% { transform: translateY(-5px); background: #00c8ff; }
}
.ai-preview-bar { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: #111; border-top: 1px solid #1a1a1a; flex-shrink: 0; }
.ai-preview-bar img { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; border: 1px solid #333; }
.ai-preview-name { font-size: 12px; color: #aaa; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ai-remove-file { background: transparent; border: none; color: #ff4444; cursor: pointer; font-size: 18px; padding: 0 4px; }
.ai-toolbar { display: flex; gap: 6px; padding: 8px 14px 4px; flex-shrink: 0; }
.ai-attach-btn { background: #1a1a1a; border: 1px solid #333; color: #888; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.ai-attach-btn:hover { background: #2a2a2a; color: #fff; border-color: #555; }
.ai-input-row { display: flex; gap: 8px; padding: 10px 14px 14px; flex-shrink: 0; }
.ai-input { flex: 1; padding: 10px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
.ai-input:focus { border-color: #00c8ff; }
.ai-send-btn { padding: 10px 18px; background: #fff; color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
.ai-send-btn:hover { background: #ddd; }
.ai-send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
.ai-note { font-size: 11px; color: #444; text-align: center; padding: 0 14px 8px; flex-shrink: 0; }
.ai-note a { color: #00c8ff; }

.ai-mode-toggle { background:#1a1a1a; border:1px solid #333; color:#ccc; border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; margin-left:auto; }
.ai-mode-toggle span { opacity:0.6; }
.ai-mode-toggle .active { opacity:1; color:#00c8ff; }
.ai-img { max-width:100%; border-radius:10px; margin-top:8px; display:block; }



        .video-call-modal { animation: fadeIn 0.3s ease-out; }

    * {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease, opacity 0.2s ease;
    }

    
    button {
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease, background-color 0.2s ease, opacity 0.2s ease !important;
    }
    button:hover { transform: scale(1.07) !important; }
    button:active { transform: scale(0.94) !important; }

    
    input, textarea {
      transition: border-color 0.2s ease, box-shadow 0.25s ease !important;
    }

    
    @keyframes msgSlideIn {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .message-bubble {
      animation: msgSlideIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    
    @keyframes cardPop {
      from { opacity: 0; transform: translateY(22px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .glow-border {
      animation: cardPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    
    @keyframes roomFadeIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    
    .emoji-picker {
      animation: cardPop 0.22s cubic-bezier(0.34,1.56,0.64,1) both !important;
      transform-origin: bottom right;
    }

    
    @keyframes reactionBounce {
      0%   { transform: scale(0.5); opacity: 0; }
      60%  { transform: scale(1.25); }
      100% { transform: scale(1); opacity: 1; }
    }
    .reaction {
      animation: reactionBounce 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), background 0.2s ease !important;
    }
    .reaction:hover { transform: scale(1.18) !important; }

    
    .incoming-call {
      animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both !important;
    }

    
    .debug-console {
      animation: debugSlide 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes debugSlide {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    
    .ai-panel {
      animation: aiPanelIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both !important;
      transform-origin: bottom right;
    }
    @keyframes aiPanelIn {
      from { opacity: 0; transform: scale(0.88) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    
    .ai-msg {
      animation: msgSlideIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    
    .ai-fab, .proxy-fab {
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease !important;
    }
    .ai-fab:hover, .proxy-fab:hover {
      transform: scale(1.15) rotate(-8deg) !important;
    }

    
    .minimized-window {
      animation: cardPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
      transition: width 0.3s ease, height 0.3s ease, bottom 0.3s ease, right 0.3s ease !important;
    }

    
    .video-call-modal {
      animation: fadeIn 0.3s ease both !important;
    }

    
    .reply-preview {
      animation: msgSlideIn 0.2s ease both;
    }

    
    .typing-indicator {
      animation: typingPulse 2s ease-in-out infinite;
    }
    @keyframes typingPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    
    .system-message {
      animation: fadeIn 0.4s ease both;
    }

    
    * { scroll-behavior: smooth; }

      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease, background-color 0.2s ease, opacity 0.2s ease !important;
    }
    button:hover { transform: scale(1.07) !important; }
    button:active { transform: scale(0.94) !important; }

    /* Inputs */
    input, textarea {
      transition: border-color 0.2s ease, box-shadow 0.25s ease !important;
    }

    /* Message bubbles slide in */
    @keyframes msgSlideIn {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .message-bubble {
      animation: msgSlideIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* Room cards pop in */
    @keyframes cardPop {
      from { opacity: 0; transform: translateY(22px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .glow-border {
      animation: cardPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* Room list items stagger */
    @keyframes roomFadeIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Emoji picker bounce in */
    .emoji-picker {
      animation: cardPop 0.22s cubic-bezier(0.34,1.56,0.64,1) both !important;
      transform-origin: bottom right;
    }

    /* Reactions bounce */
    @keyframes reactionBounce {
      0%   { transform: scale(0.5); opacity: 0; }
      60%  { transform: scale(1.25); }
      100% { transform: scale(1); opacity: 1; }
    }
    .reaction {
      animation: reactionBounce 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), background 0.2s ease !important;
    }
    .reaction:hover { transform: scale(1.18) !important; }

    /* Incoming call slide up */
    .incoming-call {
      animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both !important;
    }

    /* Debug console slide in from right */
    .debug-console {
      animation: debugSlide 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes debugSlide {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* AI panel slide up */
    .ai-panel {
      animation: aiPanelIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both !important;
      transform-origin: bottom right;
    }
    @keyframes aiPanelIn {
      from { opacity: 0; transform: scale(0.88) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* AI messages pop in */
    .ai-msg {
      animation: msgSlideIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* FAB buttons wiggle on hover */
    .ai-fab, .proxy-fab {
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease !important;
    }
    .ai-fab:hover, .proxy-fab:hover {
      transform: scale(1.15) rotate(-8deg) !important;
    }

    /* Minimized windows slide in */
    .minimized-window {
      animation: cardPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
      transition: width 0.3s ease, height 0.3s ease, bottom 0.3s ease, right 0.3s ease !important;
    }

    /* Video call modal fade in */
    .video-call-modal {
      animation: fadeIn 0.3s ease both !important;
    }

    /* Reply preview slide down */
    .reply-preview {
      animation: msgSlideIn 0.2s ease both;
    }

    /* Typing indicator pulse */
    .typing-indicator {
      animation: typingPulse 2s ease-in-out infinite;
    }
    @keyframes typingPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* System messages fade in */
    .system-message {
      animation: fadeIn 0.4s ease both;
    }

    /* Scrollbar smooth */

<canvas id="constellation-canvas"></canvas>
<script>
(function(){
  const canvas = document.getElementById('constellation-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], lines = [];
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for(let i=0;i<140;i++){
    stars.push({
      x: Math.random()*99999, y: Math.random()*99999,
      r: Math.random()*1.4+0.3,
      vx:(Math.random()-0.5)*0.08, vy:(Math.random()-0.5)*0.08,
      opacity: Math.random()*0.5+0.4
    });
  }
  function draw(){
    stars.forEach(s=>{ s.x+=s.vx; s.y+=s.vy; if(s.x<0||s.x>W)s.vx*=-1; if(s.y<0||s.y>H)s.vy*=-1; });
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<stars.length;i++){
      for(let j=i+1;j<stars.length;j++){
        const dx=stars[i].x-stars[j].x, dy=stars[i].y-stars[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();
          ctx.moveTo(stars[i].x,stars[i].y);
          ctx.lineTo(stars[j].x,stars[j].y);
          ctx.strokeStyle=`rgba(255,255,255,${0.12*(1-d/120)})`;
          ctx.lineWidth=0.5;
          ctx.stroke();
        }
      }
    }
    stars.forEach(s=>{
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

    const MinimizedWindow = ({ title, url, onClose, icon }) => {
      const [isMaximized, setIsMaximized] = useState(false);
      const [position, setPosition] = useState({ x: window.innerWidth - 320, y: window.innerHeight - 250 });
      const [isDragging, setIsDragging] = useState(false);
      const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

      const handleMouseDown = (e) => {
        if (e.target.closest('.window-btn')) return;
        setIsDragging(true);
        setDragOffset({
          x: e.clientX - position.x,
          y: e.clientY - position.y
        });
      };

      const handleMouseMove = (e) => {
        if (isDragging && !isMaximized) {
          setPosition({
            x: e.clientX - dragOffset.x,
            y: e.clientY - dragOffset.y
          });
        }
      };

      const handleMouseUp = () => {
        setIsDragging(false);
      };

      useEffect(() => {
        if (isDragging) {
          document.addEventListener('mousemove', handleMouseMove);
          document.addEventListener('mouseup', handleMouseUp);
          return () => {
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);
          };
        }
      }, [isDragging, dragOffset]);

      return (
        <div 
          className={`minimized-window ${isMaximized ? 'maximized' : ''}`}
          style={!isMaximized ? { 
            left: `${position.x}px`, 
            top: `${position.y}px`,
            right: 'auto',
            bottom: 'auto'
          } : {}}
        >
          <div 
            className="minimized-window-header"
            onMouseDown={handleMouseDown}
          >
            <div className="minimized-window-title">
              <span>{icon}</span>
              <span>{title}</span>
            </div>
            <div className="minimized-window-controls">
              <button 
                className="window-btn" 
                onClick={() => setIsMaximized(!isMaximized)}
                title={isMaximized ? "Minimize" : "Maximize"}
              >
                {isMaximized ? '🗗' : '🗖'}
              </button>
              <button 
                className="window-btn" 
                onClick={onClose}
                title="Close"
              >
                <IconX />
              </button>
            </div>
          </div>
          <div className="minimized-window-content">
            <iframe 
              src={url} 
              className="game-iframe"
              title={title}
              allow="camera; microphone; fullscreen"
            />
          </div>
        </div>
      );
    };

              if (snap.val()) { ref.off(); resolve(snap.val()); }
            });
          });

          
          if (pc.signalingState === 'closed') return;

          await pc.setRemoteDescription(new RTCSessionDescription(offer));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await flushIce();  
          await db.ref(answerPath).set({ type: answer.type, sdp: answer.sdp });
          setGroupCallParticipants(prev => prev.includes(participant) ? prev : [...prev, participant]);
        }
      };

        groupCallListenersRef.current.forEach(({ ref, event, fn }) => ref.off(event, fn));

        Object.keys(groupPeerConnectionsRef.current).forEach(peer => {
          try { groupPeerConnectionsRef.current[peer].close(); } catch(e) {}

        Object.values(participantVideoRefs.current).forEach(el => {

        participantStreamsRef.current = {};
        participantVideoRefs.current = {};

        
        if (groupLocalStreamRef.current) {
          groupLocalStreamRef.current.getTracks().forEach(t => { t.stop(); t.enabled = false; });
          groupLocalStreamRef.current = null;
        }
        
        if (localVideoRef.current && localVideoRef.current.srcObject) {
          localVideoRef.current.srcObject.getTracks().forEach(t => { t.stop(); t.enabled = false; });

        if (localVideoRef.current) { localVideoRef.current.srcObject = null; localVideoRef.current.load(); }

<script>
window._cMouse = {x:-9999,y:-9999};
window.addEventListener('mousemove',function(e){window._cMouse.x=e.clientX;window._cMouse.y=e.clientY;});
window.addEventListener('mouseleave',function(){window._cMouse.x=-9999;window._cMouse.y=-9999;});
(function(){
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;' ;
  document.body.prepend(canvas);
  const ctx = canvas.getContext('2d');
  let W = canvas.width = window.innerWidth;
  let H = canvas.height = window.innerHeight;
  let mouse = {x: W/2, y: H/2};
  const PARTICLE_COUNT = 120;
  const CONNECTION_DIST = 140;
  const MOUSE_DIST = 160;
  const particles = [];

  class Particle {
    constructor(){
      this.x = Math.random()*W;
      this.y = Math.random()*H;
      this.vx = (Math.random()-0.5)*0.35;
      this.vy = (Math.random()-0.5)*0.35;
      this.r = Math.random()*1.8+0.6;
      this.opacity = Math.random()*0.5+0.3;
    }
    update(){
      this.x += this.vx;
      this.y += this.vy;
      if(this.x<0||this.x>W) this.vx*=-1;
      if(this.y<0||this.y>H) this.vy*=-1;
      const dx = mouse.x-this.x, dy = mouse.y-this.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist<MOUSE_DIST){
        const force = (MOUSE_DIST-dist)/MOUSE_DIST*0.012;
        this.vx -= dx*force;
        this.vy -= dy*force;
        const speed = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
        if(speed>1.2){this.vx=(this.vx/speed)*1.2;this.vy=(this.vy/speed)*1.2;}
      }
      const maxSpeed = 0.8;
      const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
      if(spd>maxSpeed){this.vx=(this.vx/spd)*maxSpeed;this.vy=(this.vy/spd)*maxSpeed;}
    }
    draw(){
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+Math.min(this.opacity*1.2,0.8)+')';
      ctx.fill();
    }
  }

  for(let i=0;i<PARTICLE_COUNT;i++) particles.push(new Particle());

  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  window.addEventListener('resize',()=>{
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  });

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<particles.length;i++){
      particles[i].update();
      particles[i].draw();
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x;
        const dy=particles[i].y-particles[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<CONNECTION_DIST){
          const alpha=(1-d/CONNECTION_DIST)*0.18;
          ctx.beginPath();
          ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle='rgba(255,255,255,'+Math.min(alpha*1.4,0.35)+')';
          ctx.lineWidth=0.7;
          ctx.stroke();
        }
      }
      const mdx=mouse.x-particles[i].x, mdy=mouse.y-particles[i].y;
      const md=Math.sqrt(mdx*mdx+mdy*mdy);
      if(md<MOUSE_DIST){
        const alpha=(1-md/MOUSE_DIST)*0.35;
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(mouse.x,mouse.y);
        ctx.strokeStyle='rgba(255,255,255,'+Math.min(alpha*1.4,0.35)+')';
        ctx.lineWidth=0.9;
        ctx.stroke();
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
  } // end startConstellation
})();
</script>

<div id="const-debug" style="position:fixed;bottom:12px;left:12px;z-index:99999;background:rgba(0,0,0,0.85);color:#0f0;font-family:monospace;font-size:11px;padding:10px 14px;border-radius:8px;border:1px solid #0f0;pointer-events:none;"></div>
<script>
window._cMouse = {x:-9999,y:-9999};
window.addEventListener('mousemove',function(e){window._cMouse.x=e.clientX;window._cMouse.y=e.clientY;});
window.addEventListener('mouseleave',function(){window._cMouse.x=-9999;window._cMouse.y=-9999;});
(function(){
  var el = document.getElementById('const-debug');
  var frames = 0;
  function update(){
    var canvas = document.getElementById('constellation-canvas');
    if(!canvas){ el.innerHTML='❌ canvas NOT FOUND'; return; }
    el.innerHTML = '✅ canvas: '+canvas.width+'x'+canvas.height+'<br>frames: '+(++frames)+'<br>z-index: '+getComputedStyle(canvas).zIndex+'<br>display: '+getComputedStyle(canvas).display;
    if(frames < 200) requestAnimationFrame(update);
    else { setTimeout(()=>el.remove(), 1000); }
  }
  update();
})();
</script>
</body>
</html>
