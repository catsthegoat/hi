<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pioneers Proxy</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#08080f;color:#fff;font-family:Satoshi,-apple-system,sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;}
    h1{font-size:26px;font-weight:800;letter-spacing:-0.03em;}
    p{color:rgba(255,255,255,0.4);font-size:13px;}
    .bar{display:flex;gap:10px;width:100%;max-width:580px;}
    input{flex:1;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;color:#fff;font-size:14px;outline:none;font-family:inherit;}
    input:focus{border-color:rgba(255,255,255,0.35);}
    input::placeholder{color:rgba(255,255,255,0.3);}
    button{padding:12px 20px;background:#fff;color:#000;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    button:hover{background:#ddd;}
    .back{position:fixed;top:16px;left:16px;background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 14px;font-size:13px;text-decoration:none;font-family:inherit;}
    .topbar{display:none;position:fixed;top:0;left:0;right:0;height:46px;background:rgba(8,8,15,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.08);z-index:1000;align-items:center;padding:0 12px;gap:8px;}
    .topbar input{padding:7px 12px;font-size:13px;border-radius:8px;}
    .topbar button{padding:7px 12px;font-size:12px;border-radius:8px;}
    .close-btn{background:rgba(255,255,255,0.08)!important;color:#fff!important;border:1px solid rgba(255,255,255,0.1)!important;}
    iframe{display:none;position:fixed;top:46px;left:0;right:0;bottom:0;width:100%;height:calc(100% - 46px);border:none;z-index:999;background:#000;}
    .shortcuts{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:580px;}
    .shortcut{padding:7px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:999px;font-size:12px;color:rgba(255,255,255,0.6);cursor:pointer;}
    .shortcut:hover{background:rgba(255,255,255,0.1);color:#fff;}
  </style>
</head>
<body>
  <a href="/" class="back">← Pioneers</a>
  <div id="main" style="display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;">
    <h1>🔓 Pioneers Proxy</h1>
    <p>Browse any blocked site through the proxy</p>
    <div class="bar">
      <input id="inp" type="text" placeholder="Enter URL or search... (e.g. google.com)" autofocus/>
      <button onclick="go()">Go</button>
    </div>
    <div class="shortcuts">
      <span class="shortcut" onclick="nav('https://google.com')">🔍 Google</span>
      <span class="shortcut" onclick="nav('https://youtube.com')">▶️ YouTube</span>
      <span class="shortcut" onclick="nav('https://reddit.com')">👾 Reddit</span>
      <span class="shortcut" onclick="nav('https://discord.com')">💬 Discord</span>
      <span class="shortcut" onclick="nav('https://twitter.com')">🐦 Twitter</span>
      <span class="shortcut" onclick="nav('https://twitch.tv')">🎮 Twitch</span>
    </div>
  </div>
  <div class="topbar" id="topbar">
    <button class="close-btn" onclick="closeFrame()">✕</button>
    <input id="topinp" type="text" placeholder="Enter URL..." onkeydown="if(event.key==='Enter')nav(this.value)"/>
    <button onclick="nav(document.getElementById('topinp').value)">Go</button>
  </div>
  <iframe id="frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>
  <script>
    function toURL(v){v=v.trim();if(!v)return null;if(!v.includes('.')&&!v.startsWith('http'))return 'https://www.google.com/search?q='+encodeURIComponent(v);if(!v.startsWith('http'))v='https://'+v;return v;}
    function go(){nav(document.getElementById('inp').value);}
    function nav(v){const u=toURL(v);if(!u)return;document.getElementById('frame').src='/proxy?url='+encodeURIComponent(u);document.getElementById('frame').style.display='block';document.getElementById('topbar').style.display='flex';document.getElementById('topinp').value=u;document.getElementById('main').style.display='none';}
    function closeFrame(){document.getElementById('frame').style.display='none';document.getElementById('topbar').style.display='none';document.getElementById('frame').src='';document.getElementById('main').style.display='flex';}
    document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  </script>
</body>
</html>
